name: Zmanim Calculator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: std
            args: "--no-default-features --features std"
          - name: std+defmt
            args: "--no-default-features --features std,defmt"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - run: cargo clippy -p zmanim-calculator ${{ matrix.args }} -- -D warnings

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Check documentation
        run: cargo doc -p zmanim-calculator --no-deps --no-default-features --features std
        env:
          RUSTDOCFLAGS: -D warnings

  check:
    name: Check (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: std
            args: "--no-default-features --features std"
          - name: std+defmt
            args: "--no-default-features --features std,defmt"
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo check -p zmanim-calculator ${{ matrix.args }}

  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview
          cache: false
      - uses: taiki-e/install-action@cargo-llvm-cov
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build Java submodule
        shell: bash
        working-directory: crates/zmanim-calculator/kosher-java
        run: mvn -DskipTests -Dmaven.javadoc.skip=true -Dmaven.source.skip=true package
      - name: Run tests
        env:
          RUST_BACKTRACE: 1
          TEST_ITERATIONS: 1000
        run: cargo llvm-cov -p zmanim-calculator --no-report --verbose
      - name: Run tests (no default features)
        env:
          RUST_BACKTRACE: 1
          TEST_ITERATIONS: 100
        run: cargo test -p zmanim-calculator --verbose --no-default-features
