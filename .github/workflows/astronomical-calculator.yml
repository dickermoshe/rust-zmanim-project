name: Astronomical Calculator

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - run: cargo clippy -p astronomical-calculator --all-targets --all-features -- -D warnings

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Check documentation
        run: cargo doc -p astronomical-calculator --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  test:
    name: Test (${{ matrix.rust }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.rust }}
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests
        env:
          RUST_BACKTRACE: 1
          PROPTEST_CASES: 10000
        run: cargo llvm-cov -p astronomical-calculator --no-report --verbose
      - name: Generate Codecov report
        run: cargo llvm-cov --codecov --output-path codecov.json --no-run
      - name: Upload Codecov report
        uses: codecov/codecov-action@v5
        with:
          files: codecov.json
          flags: astronomical-calculator
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
