name: Hebrew Holiday Calendar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - run: cargo clippy -p hebrew_holiday_calendar -- -D warnings

  test:
    name: Test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: false
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Build Java submodule
        shell: bash
        working-directory: crates/hebrew_holiday_calendar/kosher-java
        run: mvn -DskipTests -Dmaven.javadoc.skip=true -Dmaven.source.skip=true package
      - name: Run tests
        env:
          RUST_BACKTRACE: 1
          TEST_ITERATIONS: 10000
        run: cargo test -p hebrew_holiday_calendar --verbose
      - name: Run tests (no default features)
        env:
          RUST_BACKTRACE: 1
          TEST_ITERATIONS: 100
        run: cargo test -p hebrew_holiday_calendar --verbose --no-default-features
