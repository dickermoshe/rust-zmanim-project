name: Limudim Calendar

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - run: cargo clippy -p limudim-calendar --all-targets --all-features -- -D warnings

  docs:
    name: Documentation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Check documentation
        run: cargo doc -p limudim-calendar --all-features --no-deps
        env:
          RUSTDOCFLAGS: -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: llvm-tools-preview
      - uses: taiki-e/install-action@cargo-llvm-cov
      - name: Run tests
        run: cargo llvm-cov -p limudim-calendar --no-report --verbose
      - name: Generate Codecov report
        run: cargo llvm-cov --codecov --output-path codecov.json --no-run
      - name: Upload Codecov report
        uses: codecov/codecov-action@v5
        with:
          files: codecov.json
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true

  wasm:
    name: WASM Build & JS Tests
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install wasm-bindgen-cli
        run: cargo install wasm-bindgen-cli
      - name: Install wasm-pack
        run: cargo install wasm-pack
      - uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      - name: Install JS dependencies
        working-directory: crates/limudim-calendar/limudim-wasm
        run: bun install
      - name: Build WASM
        working-directory: crates/limudim-calendar/limudim-wasm
        run: bun run build
      - name: Run JS tests
        working-directory: crates/limudim-calendar/limudim-wasm
        run: bun test
