[package]
name = "zmanim-calculator"
version = "0.1.0"
description = "A comprehensive Rust library for calculating Zmanim with no_std support"
edition = "2021"
license = "LGPL-2.1"
repository = "https://github.com/dickermoshe/zmanim-calculator"
homepage = "https://github.com/dickermoshe/zmanim-calculator"
documentation = "https://docs.rs/zmanim-calculator"

[features]
# By default, only the core functionality is enabled.
default = []
# Enable this feature to use the standard library.
std = []
# Enable this feature to use the defmt crate for logging.
defmt = ["dep:defmt"]
# Enable this feature to use the C API.
c = ["std", "dep:interoptopus", "dep:interoptopus_backend_c"]

[lib]
crate-type = ["cdylib", "staticlib", "rlib"]


[dependencies]
astronomical-calculator = "0.4.1"
icu_calendar = { version = "2.0.3", features = [
    "unstable",
], default-features = false }
chrono = { version = "0.4.44", default-features = false }
time = { version = "0.3.47", default-features = false }
defmt = { version = "1.0.1", optional = true }
core_maths = "0.1.1"
hebrew_holiday_calendar = "0.2.2"
thiserror = { version = "2.0.18", default-features = false }
interoptopus = { version = "0.14.27", optional = true }
interoptopus_backend_c = { version = "0.14.25", optional = true }

[dev-dependencies]
chrono = { version = "0.4.41", default-features = false, features = ["std"] }
lazy_static = "1.5.0"
j4rs = "0.24.0"
num_enum = "0.7.5"
proptest = "1.10.0"
rand = "0.8.5"
tinystr = "0.8.2"
tzf-rs = "1.1.3"
chrono-tz = { version = "0.10.4", default-features = false }


[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
