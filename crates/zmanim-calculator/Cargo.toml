[package]
name = "zmanim-calendar"
version = "0.1.0"
description = "A comprehensive Rust library for calculating Zmanim with the Hebrew calendar with no_std support"
edition = "2021"
license = "LGPL-2.1"

[features]
default = ["std"]
std = []
defmt = ["dep:defmt", "hebrew_holiday_calendar/defmt"]

[dependencies]
hebrew_holiday_calendar = "0.2.0"
defmt = { version = "1.0.1", optional = true }
icu_calendar = { version = "2.0.3", features = [
    "unstable",
], default-features = false }
astronomical-calculator = "0.3.0"
chrono = { version = "0.4.41", default-features = false }
heapless = "0.9.2"
time = { version = "0.3.44", default-features = false }
j4rs = "0.24.0"

[dev-dependencies]
lazy_static = "1.5.0"
num_enum = "0.7.5"
proptest = "1.9.0"
rand = "0.8.5"
tinystr = "0.8.2"
tzf-rs = "1.1.3"
chrono-tz = { version = "0.10.4", default-features = false }


[lints.clippy]
unwrap_used = "warn"
expect_used = "warn"
panic = "warn"
